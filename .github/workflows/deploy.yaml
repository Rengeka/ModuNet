name: publish to nuget

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - src/ModuNet.Core/ModuNet.Core.csproj
          - src/ModuNet.AspNet.Core/ModuNet.AspNet.Core.csproj
          - src/ModuNet.AspNet.Rest/ModuNet.AspNet.Rest.csproj
          - build/ModuNet.Templates.csproj


    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore ${{ matrix.project }}

      - name: Build
        run: dotnet build ${{ matrix.project }} -c Release --no-restore

      - name: Pack
        run: dotnet pack ${{ matrix.project }} -c Release --no-build -o ./nupkgs

      - name: Push
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate