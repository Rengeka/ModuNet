name: publish to nuget

on:
  push:
    branches:
      - main

jobs:
  publish-core:
    name: Publish ModuNet.Core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore src/ModuNet.Core/ModuNet.Core.csproj

      - name: Build
        run: dotnet build src/ModuNet.Core/ModuNet.Core.csproj -c Release --no-restore

      - name: Pack
        run: dotnet pack src/ModuNet.Core/ModuNet.Core.csproj -c Release --no-build -o ./nupkgs

      - name: Push to NuGet
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  publish-aspnet-core:
